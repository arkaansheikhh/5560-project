<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile - CyberChallenge Platform</title>
    <style>
        
        .profile-header {
            display: flex;
            align-items: center;
            margin-bottom: 20px;
        }
        .profile-pic {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background-color: #16213e;
            margin-right: 20px;
        }
        .stats {
            display: flex;
            justify-content: space-between;
            margin-bottom: 20px;
        }
        .stat-box {
            background-color: #16213e;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
        }
        .stat-box h3 {
            color: #0f0;
            margin: 0;
        }
    </style>
</head>
<body>
    <div class="dashboard">
        <div class="sidebar">
          
        </div>
        <div class="content">
            <div class="profile-header">
                <div class="profile-pic"></div>
                <h1>HackMaster3000</h1>
            </div>
            <div class="stats">
                <div class="stat-box">
                    <h3>15,000</h3>
                    <p>Points</p>
                </div>
                <div class="stat-box">
                    <h3>47</h3>
                    <p>Challenges Completed</p>
                </div>
                <div class="stat-box">
                    <h3>1st</h3>
                    <p>Rank</p>
                </div>
            </div>
            <h2>Recent Activity</h2>
            <ul>
                <li>Completed "Advanced Port Scanning" challenge</li>
                <li>Earned badge: Network Ninja</li>
                <li>Reached 15,000 points</li>
            </ul>
        </div>
    </div>
</body>
</html>
