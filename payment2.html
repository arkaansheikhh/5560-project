<!DOCTYPE html>
<html>
<head>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Arial', sans-serif;
        }

        body {
            background-color: #0a0a0a;
            color: #ffffff;
            line-height: 1.6;
            padding: 2rem;
            min-height: 100vh;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
            padding: 2rem;
            background-color: #111827;
            border-radius: 8px;
            border: 1px solid #2d3748;
        }

        .header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .header h1 {
            font-size: 2rem;
            margin-bottom: 1rem;
            background: linear-gradient(to right, #4ade80, #06b6d4);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .payment-form {
            display: grid;
            gap: 1.5rem;
        }

        .form-group {
            display: grid;
            gap: 0.5rem;
        }

        .form-group label {
            color: #9ca3af;
            font-size: 0.875rem;
        }

        .form-group input {
            width: 100%;
            padding: 0.75rem;
            background-color: #1f2937;
            border: 1px solid #374151;
            border-radius: 4px;
            color: #ffffff;
            transition: border-color 0.3s ease;
        }

        .form-group input:focus {
            outline: none;
            border-color: #4ade80;
            box-shadow: 0 0 0 2px rgba(74, 222, 128, 0.1);
        }

        .payment-button {
            display: inline-block;
            width: 100%;
            padding: 1rem;
            background: linear-gradient(to right, #4ade80, #06b6d4);
            border: none;
            border-radius: 4px;
            color: #ffffff;
            font-weight: bold;
            text-align: center;
            text-decoration: none;
            cursor: pointer;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .payment-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 0 15px rgba(74, 222, 128, 0.4);
        }

        .order-summary {
            margin-top: 2rem;
            padding-top: 2rem;
            border-top: 1px solid #2d3748;
        }

        .order-summary h2 {
            color: #4ade80;
            margin-bottom: 1rem;
        }

        .price-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 0.5rem;
        }

        .security-badge {
            text-align: center;
            margin-top: 2rem;
            color: #6b7280;
            font-size: 0.875rem;
        }

        @media (max-width: 768px) {
            body {
                padding: 1rem;
            }
            
            .container {
                padding: 1rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Payment Details</h1>
        </div>

        <form class="payment-form">
            <!-- Personal Details -->
            <div class="form-group">
                <label for="name">Full Name</label>
                <input type="text" id="name" required placeholder="John Doe">
            </div>

            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" required placeholder="john@example.com">
            </div>

            <!-- Address -->
            <div class="form-group">
                <label for="address">Street Address</label>
                <input type="text" id="address" required placeholder="123 Hack Street">
            </div>

            <div class="form-group">
                <label for="city">City</label>
                <input type="text" id="city" required placeholder="Cyber City">
            </div>

            <div class="form-group">
                <label for="country">Country</label>
                <input type="text" id="country" required placeholder="Country">
            </div>

            <div class="form-group">
                <label for="postal">Postal Code</label>
                <input type="text" id="postal" required placeholder="12345">
            </div>

            <!-- Order Summary -->
            <div class="order-summary">
                <h2>Order Summary</h2>
                <div class="price-info">
                    <span>Plan:</span>
                    <span id="plan-name">Advanced Plan</span>
                </div>
                <div class="price-info">
                    <span>Price:</span>
                    <span id="plan-price">$10.00</span>
                </div>
            </div>

           
            <a href="https://paypal.me/arkaan7969" class="payment-button">
                Proceed to Payment
            </a>
        </form>

        <div class="security-badge">
            🔒 Secure Payment Processing | 256-bit SSL Encryption
        </div>
    </div>
</body>
</html>
