<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Leaderboard - CyberChallenge Platform</title>
    <style>
        /* (Include the same CSS as in the dashboard, then add:) */
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }
        th, td {
            padding: 10px;
            text-align: left;
            border-bottom: 1px solid #16213e;
        }
        th {
            background-color: #16213e;
            color: #0f0;
        }
        tr:hover {
            background-color: rgba(0,255,0,0.1);
        }
    </style>
</head>
<body>
    <div class="dashboard">
        <div class="sidebar">
            <!-- (Same sidebar as in dashboard) -->
        </div>
        <div class="content">
            <h1>Leaderboard</h1>
            <table>
                <thead>
                    <tr>
                        <th>Rank</th>
                        <th>User</th>
                        <th>Points</th>
                        <th>Challenges Completed</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td>1</td>
                        <td>HackMaster3000</td>
                        <td>15,000</td>
                        <td>47</td>
                    </tr>
                    <tr>
                        <td>2</td>
                        <td>CyberNinja</td>
                        <td>14,500</td>
                        <td>45</td>
                    </tr>
                    <!-- (Add more rows as needed) -->
                </tbody>
            </table>
        </div>
    </div>
</body>
</html>
